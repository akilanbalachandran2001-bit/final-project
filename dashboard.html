<!DOCTYPE html>

<html>
<head>
    <title>Wellness Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

```
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f7fa;
        color: #222;
    }

    .container {
        max-width: 650px;
        margin: 20px auto;
        padding: 15px;
    }

    h1 {
        text-align: center;
        margin-bottom: 5px;
    }

    .quote {
        text-align: center;
        font-style: italic;
        margin-bottom: 20px;
    }

    h2 {
        text-align: center;
        font-weight: 500;
        margin-bottom: 25px;
    }

    .card {
        background: #fff;
        padding: 12px 15px;
        margin: 10px 0;
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
    }

    .card a {
        color: #333;
        font-weight: 600;
        font-size: 17px;
        text-decoration: none;
        flex: 1;
    }

    .card a:hover {
        color: #22c55e;
    }

    .logout {
        display: block;
        text-align: center;
        margin-top: 25px;
        font-weight: 600;
        text-decoration: none;
        color: #f44336;
    }

    .logout:hover {
        text-decoration: underline;
    }

    .last-logout {
        text-align: center;
        font-size: 0.9em;
        color: #555;
        margin-bottom: 15px;
    }
</style>
```

</head>

<body>
    <div class="container">

```
    <h1>🧠 Wellness Dashboard</h1>
    <p class="quote">🌟 {{ quote }}</p>
    <h2>Welcome {{ user }} 👋</h2>

    {% if last_logout %}
    <div class="last-logout">🕒 Last logout: {{ last_logout }}</div>
    {% endif %}

    <!-- Activity Links -->
    <div class="card"><a href="{{ url_for('mood') }}">😊 Mood Tracker</a></div>
    <div class="card"><a href="{{ url_for('meditation') }}">🧘 Meditation</a></div>
    <div class="card"><a href="{{ url_for('sleep') }}">🌙 Sleep Tracker</a></div>
    <div class="card"><a href="{{ url_for('journal') }}">📖 Daily Journal</a></div>
    <div class="card"><a href="{{ url_for('water') }}">💧 Water Tracker</a></div>
    <div class="card"><a href="{{ url_for('habit') }}">📅 Habit Tracker</a></div>
    <div class="card"><a href="{{ url_for('score') }}">🎯 Wellness Score</a></div>

    <a class="logout" href="{{ url_for('logout') }}">Logout</a>

</div>
```

</body>
</html>
