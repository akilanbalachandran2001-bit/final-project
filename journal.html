<!DOCTYPE html>
<html>
<head>
<title>Daily Mental Journal</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.journal-card{
background:white;
color:#333;
padding:18px;
border-radius:15px;
margin:12px 0;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:left;
}

.journal-card h3{
margin-bottom:10px;
}

.journal-card label{
display:block;
margin-top:10px;
font-weight:500;
}

.journal-card textarea,
.journal-card select{
width:100%;
margin-top:6px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
color:#333;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background-color: #4caf50;
    color: white;
    cursor: pointer;
    font-weight: 600;
    margin-top: 12px;
}

button:hover {
    background-color: #45a049;
}

.message {
    margin: 10px 0;
    padding: 8px 12px;
    border-radius: 8px;
    background-color: #d1fae5;
    color: #065f46;
    font-weight: 500;
}

/* Activity Status */
.activity-status{
margin:6px 0;
padding:8px 12px;
border-radius:8px;
background:#e0f7fa;
font-weight:500;
color:#006064;
}

</style>

</head>

<body>

<div class="container">

<h1>📖 Daily Mental Journal</h1>

<p class="quote">🌟 {{ quote }}</p>

<!-- Activity Status Overview -->
<div class="section-title">✅ Today's Activity Status</div>



{% if message %}
<div class="message">{{ message }}</div>
{% endif %}

<!-- Journal Form -->
<form method="POST">

<div class="journal-card">

<h3>✍ Write your thoughts</h3>
<textarea name="thoughts" rows="4" placeholder="Write what is on your mind...">{{ notes.thoughts if notes else '' }}</textarea>

<label>😊 How do you feel today?</label>
<select name="mood">
<option value="Very Happy" {% if notes and notes.mood=="Very Happy" %}selected{% endif %}>Very Happy</option>
<option value="Happy" {% if notes and notes.mood=="Happy" %}selected{% endif %}>Happy</option>
<option value="Neutral" {% if notes and notes.mood=="Neutral" %}selected{% endif %}>Neutral</option>
<option value="Sad" {% if notes and notes.mood=="Sad" %}selected{% endif %}>Sad</option>
<option value="Very Sad" {% if notes and notes.mood=="Very Sad" %}selected{% endif %}>Very Sad</option>
</select>

</div>

<div class="journal-card">

<h3>🙏 Gratitude</h3>
<textarea name="gratitude" rows="3" placeholder="Write 1 thing you are grateful for today">{{ notes.gratitude if notes else '' }}</textarea>

</div>

<!-- Hidden field for score update -->
<input type="hidden" name="update_score" value="1">

<button type="submit">Save Journal</button>

</form>

<br>

<a class="back" href="{{ url_for('dashboard') }}">⬅ Back</a>

</div>

</body>
</html>
